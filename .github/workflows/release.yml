name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to (re)build, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: true

      - name: Build darwin binaries
        run: |
          set -eu
          version="${GITHUB_REF_NAME:-${{ github.event.inputs.tag }}}"
          for arch in amd64 arm64; do
            out="claude-monitor-darwin-${arch}"
            echo "building ${out} (${version})"
            GOOS=darwin GOARCH="${arch}" CGO_ENABLED=1 go build \
              -ldflags "-X main.version=${version} -linkmode=external" \
              -o "${out}" ./...
            codesign -f -s - "${out}"
          done
          shasum -a 256 claude-monitor-darwin-* > checksums.txt
          cat checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            claude-monitor-darwin-amd64
            claude-monitor-darwin-arm64
            checksums.txt
